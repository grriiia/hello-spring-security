<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">비밀번호 변경</h2>

    <form th:action="@{/user/password}"
          th:object="${passwordChangeDto}"
          method="post">

        <div class="mb-3">
            <label>현재 비밀번호</label>
            <input type="password"
                   th:field="*{currentPassword}"
                   class="form-control">

            <div class="text-danger"
                 th:errors="*{currentPassword}">
            </div>
        </div>

        <div class="mb-3">
            <label>새 비밀번호</label>
            <input type="password"
                   th:field="*{newPassword}"
                   class="form-control">

            <div class="text-danger"
                 th:errors="*{newPassword}">
            </div>
        </div>

        <div class="mb-3">
            <label>새 비밀번호 확인</label>
            <input type="password"
                   th:field="*{confirmPassword}"
                   class="form-control">

            <div class="text-danger"
                 th:errors="*{confirmPassword}">
            </div>
        </div>

        <button type="submit"
                class="btn btn-primary">
            비밀번호 변경
        </button>

    </form>
    <br>
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171348 | 성명: 이규현'}"></p>
</div>
</body>
</html>
