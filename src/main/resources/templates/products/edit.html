<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">상품 수정</h2>

    <form th:action="@{/products/{id}/edit(id=${productId})}"
          th:object="${productDto}"
          method="post">

        <div class="mb-3">
            <label>상품명</label>
            <input type="text"
                   th:field="*{name}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>설명</label>
            <textarea th:field="*{description}"
                      class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>가격</label>
            <input type="number"
                   th:field="*{price}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>재고</label>
            <input type="number"
                   th:field="*{stock}"
                   class="form-control">
        </div>

        <button type="submit"
                class="btn btn-primary">
            수정 완료
        </button>

        <a th:href="@{/products}"
           class="btn btn-secondary">
            취소
        </a>

    </form>

    <hr>

    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171348 | 성명: 이규현'}"></p>

</div>

</body>
</html>
